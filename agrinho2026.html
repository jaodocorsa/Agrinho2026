<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            scroll-behavior: smooth;
        }

        header {
            background-color: #2c3e50;
            padding: 15px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #1abc9c;
        }

        section {
            padding: 100px 20px;
            min-height: 100vh;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
        }

        .imagens {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .imagens img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        #home { background-color: #14ff82; }
        #sobre { background-color: #00e1ff; }
        #galeria { background-color: #95a5a6; }
        #contato { background-color: #20acb6; color: white; }

        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>
    <nav>
        <a href="#home">Início</a>
        <a href="#sobre">Sobre</a>
        <a href="#galeria">Galeria</a>
        <a href="#contato">Contato</a>
    </nav>
</header>

<section id="home">
    <div class="container">
        <h1>Seja bem-vindo</h1>
        <p>Esta é uma página dedicado a conteudos sobre o Agro.</p>

        <div class="imagens">
            <img src="images (2).jpeg" alt="Imagem 1">
            <img src="download (12).jpeg" alt="Imagem 2">
            <img src="download (2).jpeg" alt="Imagem 3">
        </div>
    </div>
</section>

<section id="sobre">
    <div class="container">
        <h1>Sobre</h1>
        <p>O agro sempre estara presente em nosso cotidiano.</p>

        <div class="imagens">
            <img src="images (1).jpeg" alt="Imagem 4">
            <img src="images (4).jpeg" alt="Imagem 5">
        </div>
    </div>
</section>

<section id="galeria">
    <div class="container">
        <h1>Galeria</h1>

        <div class="imagens">
            <img src="images.jpeg" alt="Imagem 6">
            <img src="images (2).jpeg" alt="Imagem 7">
            <img src="600x384_8.jpg" alt="Imagem 8">
            <img src="Gemini_Generated_Image_yrgjw2yrgjw2yrgj.png" alt="Imagem 9">
        </div>
    </div>
</section>

<section id="contato">
    <div class="container">
        <h1>Contato</h1>
        <p>Email: agro.potente@gmail.com</p>
        <p>Telefone: (45) 99122-1462</p>
    </div>
</section>

<footer>
    <p>© 2026 - Página Exemplo</p>
</footer>

</body>
</html>
